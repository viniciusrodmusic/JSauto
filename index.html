<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - JS Auto</title>
    <link rel="stylesheet" href="./src/styles/home.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Marko+One&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
</head>

<body>
    <!-- Toast Container -->
    <div id="toast-container" class="toast-container"></div>

    <header>
        <div class="header-logo">
            <img src="./assets/tools.png" alt="Logo JS Auto">
        </div>

        <h1>JS Auto</h1>
    </header>

    <main>

        <section class="login-card">

            <div class="card-info">
                <h2>
                    Gestão de clientes, cadastro de veículos e fluxo de informações agora ainda mais fácil com o JS
                    Auto!
                </h2>

                <p>
                    contato: josuesistemas@gmail.com | 2026
                </p>
                <img src="./assets/carro.png" alt="carro de fundo">
            </div>

            <div class="card-form">

                <form id="login-form" action="#" method="post">

                    <h2>Faça Login</h2>

                    <div class="form-group">
                        <label for="email"><i class="bi bi-person-circle"></i> Email:</label>
                        <input type="email" id="email" name="email" required>
                    </div>

                    <div class="form-group">
                        <label for="senha"><i class="bi bi-lock"></i> Senha:</label>
                        <div class="password-input-container">
                            <input type="password" id="senha" name="password" required>
                            <button type="button" id="toggle-password" class="password-toggle" title="Mostrar/Ocultar senha">
                                <i class="bi bi-eye"></i>
                            </button>
                        </div>
                    </div>


                    <button type="submit">Entrar</button>
                    <a href="cadastro.html">Ainda não tem conta?</a>

                    <div class="auth-refresh-container">
                        <button type="button" id="refresh-auth-btn" class="refresh-btn" title="Renovar autenticação">
                            <i class="bi bi-arrow-clockwise"></i> Renovar Auth
                        </button>
                        <span id="refresh-status" class="refresh-status"></span>
                    </div>

                </form>

            </div>

        </section>

    </main>

    <script src="./src/scripts/toast.js"></script>
    <script src="./src/scripts/api.js"></script>
    <script>
        // Password Toggle Handler
        document.addEventListener('DOMContentLoaded', function () {
            const toggleBtn = document.getElementById('toggle-password');
            const passwordInput = document.getElementById('senha');

            if (toggleBtn && passwordInput) {
                toggleBtn.addEventListener('click', function (e) {
                    e.preventDefault();

                    const isPassword = passwordInput.type === 'password';
                    passwordInput.type = isPassword ? 'text' : 'password';
                    
                    const icon = toggleBtn.querySelector('i');
                    icon.classList.toggle('bi-eye');
                    icon.classList.toggle('bi-eye-slash');
                });
            }

            // Refresh Auth Button Handler
        document.addEventListener('DOMContentLoaded', function () {
            const refreshBtn = document.getElementById('refresh-auth-btn');
            const refreshStatus = document.getElementById('refresh-status');

            if (!refreshBtn) return;

            refreshBtn.addEventListener('click', async function (e) {
                e.preventDefault();

                // Se já está carregando, não faz nada
                if (refreshBtn.classList.contains('loading')) return;

                refreshBtn.classList.add('loading');
                refreshStatus.textContent = 'Renovando autenticação...';
                refreshStatus.className = 'refresh-status';

                try {
                    await refreshSession();
                    
                    refreshStatus.textContent = '✓ Autenticação renovada com sucesso!';
                    refreshStatus.className = 'refresh-status success';
                    
                    // Limpar mensagem após 4 segundos
                    setTimeout(() => {
                        refreshStatus.textContent = '';
                        refreshStatus.className = 'refresh-status';
                    }, 4000);
                } catch (error) {
                    const errorMsg = error.message || 'Erro ao renovar autenticação';
                    refreshStatus.textContent = '✗ ' + errorMsg;
                    refreshStatus.className = 'refresh-status error';
                    
                    console.error('[Refresh Auth] Erro:', error);
                } finally {
                    refreshBtn.classList.remove('loading');
                }
            });
        });
    </script>
</body>

</html>
