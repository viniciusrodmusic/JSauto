<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro - JS Auto</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Marko+One&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./src/styles/home.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
</head>

<body>
    <!-- Toast Container -->
    <div id="toast-container" class="toast-container"></div>

    <header>
        <div class="header-logo">
            <img src="./assets/tools.png" alt="Logo JS Auto">
        </div>

        <h1>JS Auto</h1>
    </header>

    <main>

        <section class="login-card">

            <div class="card-info">
                <h2>
                    Gestão de clientes, cadastro de veículos e fluxo de informações agora ainda mais fácil com o JS
                    Auto!
                </h2>

                <p>
                    contato: josuesistemas@gmail.com | 2026
                </p>
                <img src="./assets/carro.png" alt="carro de fundo">
            </div>

            <div class="card-form">

                <form action="#" method="post">

                    <h2>Cadastre sua Conta</h2>

                    <div class="form-group">
                        <label for="email"><i class="bi bi-person-circle"></i> Email:</label>
                        <input type="text" id="email" name="email">
                    </div>

                    <div class="form-group">
                        <label for="senha"><i class="bi bi-lock"></i> Senha:</label>
                        <div class="password-input-container">
                            <input type="password" id="senha" name="senha">
                            <button type="button" id="toggle-password" class="password-toggle" title="Mostrar/Ocultar senha">
                                <i class="bi bi-eye"></i>
                            </button>
                        </div>
                    </div>


                    <button type="submit">Salvar</button>
                    <a href="index.html">Já tem conta?</a>


                </form>

            </div>

        </section>

    </main>

    <script src="./src/scripts/toast.js"></script>
    <script src="./src/scripts/api.js"></script>
    <script>
        // Password Toggle Handler
        document.addEventListener('DOMContentLoaded', function () {
            const toggleBtn = document.getElementById('toggle-password');
            const passwordInput = document.getElementById('senha');

            if (toggleBtn && passwordInput) {
                toggleBtn.addEventListener('click', function (e) {
                    e.preventDefault();

                    const isPassword = passwordInput.type === 'password';
                    passwordInput.type = isPassword ? 'text' : 'password';
                    
                    const icon = toggleBtn.querySelector('i');
                    icon.classList.toggle('bi-eye');
                    icon.classList.toggle('bi-eye-slash');
                });
            }
        });
    </script>

</body>

</html>
