<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./styles/management-screen.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Marko+One&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
    <title>Gestão - JS Auto</title>
</head>

<body>
    <!-- Tela de Loading -->
    <div id="loading-screen" class="loading-screen">
        <div class="loading-content">
            <!-- <h2>Carregando</h2> -->
            <p class="loading-text">Entrando no sistema...</p>
        </div>
        
        <!-- Engrenagens no inferior direito -->
        <div class="gears-container">
            <i class="bi bi-gear gear gear-large"></i>
            <i class="bi bi-gear gear gear-small"></i>
        </div>
    </div>

    <header>
        <div class="header-logo">
            <img src="./assets/tools.png" alt="Logo JS Auto">
        </div>

        <h1>JS Auto</h1>
    </header>

    <main>
        <!-- <div>
            <span>logado como: username_01</span>
            <a href="#">Sair</a>
        </div> -->
        <nav>
            <ul>
                <!-- Menu Cadastro com Dropdown -->
                <li class="nav-dropdown">
                    <a class="nav-link dropdown-toggle" href="#" onclick="toggleDropdown(event, 'cadastro')">
                        <i class="bi bi-plus-circle"></i> Cadastro
                        <i class="bi bi-chevron-down dropdown-icon"></i>
                    </a>
                    <ul id="cadastro" class="dropdown-menu">
                        <li><a href="#">Cadastro de Funcionários</a></li>
                        <li><a href="#">Cadastro de Clientes</a></li>
                        <li><a href="#">Cadastro de Produtos</a></li>
                        <li><a href="#">Cadastro de Veículos</a></li>
                    </ul>
                </li>

                <!-- Menu Ver com Dropdown -->
                <li class="nav-dropdown">
                    <a class="nav-link dropdown-toggle" href="#" onclick="toggleDropdown(event, 'ver')">
                        <i class="bi bi-eye"></i> Ver
                        <i class="bi bi-chevron-down dropdown-icon"></i>
                    </a>
                    <ul id="ver" class="dropdown-menu">
                        <li><a href="#">Ver Funcionários</a></li>
                        <li><a href="#">Ver Clientes</a></li>
                        <li><a href="#">Ver Produtos</a></li>
                        <li><a href="#">Ver Veículos</a></li>
                    </ul>
                </li>

                <li>
                    <a class="nav-link" href="#">
                        <i class="bi bi-file-earmark-text"></i> Orçamento
                    </a>
                </li>
            </ul>

        </nav>

        <section id="management-zone">
            <img src="./assets/carro.png" alt="">
        </section>
    </main>

    <script src="./scripts/navbar.js"></script>
    <script src="./scripts/loading.js"></script>

</body>

</html>
